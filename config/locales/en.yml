en:
  # ============================================================
  # Redmine Monaco Editor - UI strings (English)
  # ============================================================
  # These keys are exposed to the front-end JavaScript through a
  # <script> block injected by the view hook (see init.rb).
  # All keys live under the "monaco_editor" namespace.
  monaco_editor:
    # Mode buttons (left side of the toolbar)
    mode_edit: "Edit"
    mode_edit_tip: "Show editor only"
    mode_split: "Split"
    mode_split_tip: "Editor + preview (side by side)"
    mode_split_v_tip: "Editor + preview (stacked)"
    mode_preview_tip: "Show preview only"
    outline_tip: "Toggle heading outline"
    fullscreen_tip: "Toggle fullscreen"

    # Decoration buttons (right side of the toolbar)
    bold_tip: "Bold (Ctrl+B)"
    italic_tip: "Italic (Ctrl+I)"
    underline_tip: "Underline"
    strike_tip: "Strikethrough"
    code_inline_tip: "Inline code"
    h1_tip: "Heading 1"
    h2_tip: "Heading 2"
    h3_tip: "Heading 3"
    h4_tip: "Heading 4"
    ul_tip: "Bulleted list"
    ol_tip: "Numbered list"
    blockquote_tip: "Quote"
    code_block_tip: "Code block"
    table_tip: "Insert table"
    image_tip: "Insert image"
    file_link_tip: "Insert file link"
    macro_tip: "Insert macro {{ }}"
    wiki_link_tip: "Insert wiki link [[ ]]"

    # Placeholders used when wrapping a selection
    placeholder_text: "text"
    placeholder_code: "code"

    # Preview pane
    preview_loading: "Loading..."
    preview_failed: "Failed to load preview"
    preview_url_missing: "Preview URL not found"

    # Outline panel
    outline_empty: "No headings"

    # Resize handle
    resize_tip: "Drag to resize height"

    # Table picker
    table_insert: "Insert table"
    table_col_prefix: "Col"

    # Table Builder
    table_builder_tip: "Open table builder"
    tb_tab_body: "Body"
    tb_table_name: "Table"
    tb_new_tab: "New table"
    tb_close_tab: "Close tab"
    tb_add_row: "Add row"
    tb_add_col: "Add column"
    tb_del_row: "Delete row"
    tb_del_col: "Delete column"
    tb_insert_md: "Insert as Markdown"
    tb_insert_textile: "Insert as Textile"
    tb_update: "Update"
    tb_update_tip: "Write changes back to the original table"
    tb_copy_table: "Copy table"
    tb_undo: "Undo"
    tb_redo: "Redo"
    tb_copy_table_tip: "Copy this table to the clipboard (paste it into the body)"
    tb_copied: "Table copied. Press Ctrl+V where you want to paste it in the body."
    tb_copy_failed: "Copy failed. Please select the table and copy it manually."
    tb_glyph_tip: "Edit in table builder"
    tb_confirm_apply: "Apply changes to the original table?\nChoosing Cancel will discard the changes."
    tb_conflict: |
      This table has been modified in the body text, so it cannot be updated.

      If you need the contents of this table builder, select the whole table (click the top-left corner), copy it, and save it elsewhere.
      Then close this editing tab and reopen the latest table from the body to edit it again.
    tb_conflict_close: |
      This table has been modified in the body text, so the changes could not be applied.

      Closing this tab will lose your edits. If you need them, copy the table and save it elsewhere before closing.
    tb_gone: |
      The target table could not be found in the body (it may have been deleted).
      Close this editing tab and, if needed, insert it into the body anew.

    # Image picker
    image_from_attachments: "Insert from attachments"
    image_other_files: "Other files"
    image_manual_label: "Enter a file name directly"
    image_manual_placeholder: "Enter a file name (e.g. image.png)"
    insert: "Insert"

    # File link picker
    filelink_title: "Insert a link to an attachment"
    filelink_manual_label: "Enter a file name directly"
    filelink_manual_placeholder: "Enter a file name (e.g. design.pdf)"
    filelink_desc_label: "Description: "
    filelink_date_label: "Date: "

    # Ticket tooltip
    ticket_not_found: "ticket not found"
    note_prefix: "Note #"

    # My account page
    pref_section: "Monaco Editor"
    pref_enabled: "Use Monaco Editor"
    pref_theme: "Theme"
    theme_github_light: "GitHub Light"
    theme_quiet_light: "Quiet Light"
    theme_github_dark: "GitHub Dark"
    pref_font_size: "Font size"
