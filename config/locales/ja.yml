ja:
  # ============================================================
  # Redmine Monaco Editor - UI文字列（日本語）
  # ============================================================
  # これらのキーは init.rb のビューフックが埋め込む <script> 経由で
  # フロントエンドのJavaScriptに渡される。
  # すべて "monaco_editor" 名前空間の下に置く。
  monaco_editor:
    # モードボタン（ツールバー左側）
    mode_edit: "編集"
    mode_edit_tip: "編集のみ表示"
    mode_split: "分割"
    mode_split_tip: "エディタ＋プレビュー（左右）"
    mode_split_v_tip: "エディタ＋プレビュー（上下）"
    mode_preview_tip: "プレビューのみ表示"
    outline_tip: "見出しのアウトラインを表示/非表示"
    fullscreen_tip: "全画面表示の切り替え"

    # 装飾ボタン（ツールバー右側）
    bold_tip: "太字 (Ctrl+B)"
    italic_tip: "斜体 (Ctrl+I)"
    underline_tip: "下線"
    strike_tip: "取消線"
    code_inline_tip: "インラインコード"
    h1_tip: "見出し1"
    h2_tip: "見出し2"
    h3_tip: "見出し3"
    h4_tip: "見出し4"
    ul_tip: "箇条書きリスト"
    ol_tip: "番号付きリスト"
    blockquote_tip: "引用"
    code_block_tip: "コードブロック"
    table_tip: "表を挿入"
    image_tip: "画像を挿入"
    file_link_tip: "ファイルリンクを挿入"
    macro_tip: "マクロを挿入 {{ }}"
    wiki_link_tip: "Wikiリンクを挿入 [[ ]]"

    # 選択範囲を囲むときのプレースホルダ
    placeholder_text: "テキスト"
    placeholder_code: "コード"

    # プレビューペイン
    preview_loading: "読み込み中..."
    preview_failed: "プレビューの取得に失敗しました"
    preview_url_missing: "プレビューURLが見つかりません"

    # アウトラインパネル
    outline_empty: "見出しがありません"

    # リサイズハンドル
    resize_tip: "ドラッグして高さを変更"

    # 表ピッカー
    table_insert: "表を挿入"
    table_col_prefix: "列"

    # 表ビルダー（Table Builder）
    table_builder_tip: "表ビルダーを開く"
    tb_tab_body: "本文"
    tb_table_name: "表"
    tb_new_tab: "新しい表"
    tb_close_tab: "タブを閉じる"
    tb_add_row: "行追加"
    tb_add_col: "列追加"
    tb_del_row: "行削除"
    tb_del_col: "列削除"
    tb_insert_md: "Markdownで挿入"
    tb_insert_textile: "Textileで挿入"
    tb_update: "更新"
    tb_update_tip: "編集内容を元の表へ書き戻す"
    tb_copy_table: "表をコピー"
    tb_undo: "元に戻す"
    tb_redo: "やり直す"
    tb_copy_table_tip: "この表をクリップボードにコピー（本文に貼り付けて使う）"
    tb_copied: "表をコピーしました。本文の貼り付けたい位置で Ctrl+V してください。"
    tb_copy_failed: "コピーに失敗しました。表を範囲選択して手動でコピーしてください。"
    tb_glyph_tip: "表ビルダーで編集"
    tb_confirm_apply: "編集内容を元の表へ反映しますか？\n「キャンセル」を選ぶと変更は破棄されます。"
    tb_conflict: |
      本文側でこの表が変更されているため、更新できません。

      この表ビルダーの内容が必要な場合は、表を全選択（左上の角をクリック）してコピーし、別の場所へ退避してください。
      その後この編集タブを閉じ、本文の最新の表をもう一度開いて編集し直してください。
    tb_conflict_close: |
      本文側でこの表が変更されているため、反映できませんでした。

      このタブを閉じると編集内容は失われます。必要な場合は表をコピーして退避してから閉じてください。
    tb_gone: |
      書き戻し先の表が本文から見つかりません（削除された可能性があります）。
      この編集タブを閉じ、必要なら本文へ新規に挿入し直してください。

    # 画像ピッカー
    image_from_attachments: "添付ファイルから挿入"
    image_other_files: "その他のファイル"
    image_manual_label: "ファイル名を直接入力"
    image_manual_placeholder: "ファイル名を入力（例: image.png）"
    insert: "挿入"

    # ファイルリンクピッカー
    filelink_title: "添付ファイルへのリンクを挿入"
    filelink_manual_label: "ファイル名を直接入力"
    filelink_manual_placeholder: "ファイル名を入力（例: design.pdf）"
    filelink_desc_label: "説明: "
    filelink_date_label: "日付: "

    # チケットツールチップ
    ticket_not_found: "チケットが見つかりません"
    note_prefix: "注記#"

    # 個人設定画面（My account）
    pref_section: "Monaco Editor"
    pref_enabled: "Monaco Editor を使用する"
    pref_theme: "テーマ"
    theme_github_light: "GitHub Light（明るい）"
    theme_quiet_light: "Quiet Light（落ち着いた明るい）"
    theme_github_dark: "GitHub Dark（暗い）"
    pref_font_size: "フォントサイズ"
